granulationScale: 0.002
flowSpeed: 1.2
mixLowHigh: 0.65
notes: |
  Noise volumes are tileable (periodic). 'noise_low_3d' is Worley-like for large convection cells.
  'noise_high_3d' is Perlin FBM for fine turbulence.
  Flow map encodes velocity in RG channels in [0,1] (where 0.5 means 0, map from [-1,1]).
  Blue/Alpha channels are reserved for future use.
